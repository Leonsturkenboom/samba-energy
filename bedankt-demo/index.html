    <title>Bedankt — SAMBA</title>
    <link rel="icon" type="image/svg+xml" href="../Logo SAMBA.svg">
    <link rel="canonical" href="https://samba.energy/bedankt-demo/">

    <style>
        :root {
            --accent: #EEFF41;
            --bg: #212121;
            --white: #FBFBFB;
            --text-muted: #9e9e9e;
            --font-body: 'IBM Plex Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body {
            font-family: var(--font-body);
            color: var(--white);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            border-bottom: 1px solid #333;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
        }
        .nav-inner {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--white);
            font-weight: 600;
            font-size: 1rem;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 64px 24px;
        }
        .card {
            max-width: 720px;
            width: 100%;
            text-align: center;
        }
        .check {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
        }
        .check svg { width: 36px; height: 36px; }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        h1 span { color: var(--accent); }
        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: background 0.2s, color 0.2s;
        }
        .btn:hover { background: var(--accent); color: #212121; }
        .slogan {
            margin-top: 64px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>

                <img src="../Logo SAMBA.svg" alt="SAMBA" width="28" height="28">
                SAMBA
            </a>
        </div>
    </nav>

    <main>
        <div class="card">
            <div class="check">
                <svg viewBox="0 0 24 24" fill="none" stroke="#212121" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h1>Bedankt voor je <span>demo aanvraag</span></h1>
            <p>We plannen zo snel mogelijk een demo in. We nemen contact op om een moment te prikken.</p>
            <a href="https://samba.energy" class="btn">Terug naar SAMBA</a>
        </div>
    </main>
