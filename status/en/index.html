<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMBA | System Status</title>
    <link rel="icon" type="image/svg+xml" href="../../Logo SAMBA.svg">
    <meta name="description" content="SAMBA Energy system status - Real-time monitoring of all services.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav class="status-nav">
        <div class="nav-inner">
            <a href="https://samba.energy" class="nav-brand">
                <img src="../../Logo SAMBA.svg" alt="SAMBA" width="32" height="32">
                <span class="nav-title">SAMBA</span>
            </a>
            <span class="nav-label">SYSTEM STATUS</span>
        </div>
    </nav>

    <main class="status-main">
        <div class="container">
            <header class="status-header" id="statusHeader">
                <div class="status-indicator" id="overallIndicator">
                    <div class="pulse-dot"></div>
                    <span class="status-text" id="overallText">Checking services...</span>
                </div>
                <p class="status-updated" id="lastUpdated"></p>
            </header>

            <div id="serviceGroups"></div>
        </div>
    </main>

    <footer class="footer" id="footer">
        <div class="footer-inner">
            <div class="footer-links-grid">
                <div class="footer-col">
                    <a href="https://samba.energy/#smart" class="footer-link">SMART</a>
                    <a href="https://samba.energy/#flexible" class="footer-link">FLEXIBLE</a>
                    <a href="https://samba.energy/#assets" class="footer-link">ASSETS</a>
                </div>
                <div class="footer-col">
                    <a href="/status/en/" class="footer-link">STATUS</a>
                    <a href="https://samba.energy/#request" class="footer-link">REQUEST</a>
                </div>
                <div class="footer-col">
                    <a href="#" class="footer-link">LEGAL</a>
                    <a href="/privacy/en/" class="footer-link">PRIVACY</a>
                    <a href="/contact/en/" class="footer-link">CONTACT</a>
                </div>
            </div>
            <div class="footer-brand">
                <a href="https://samba.energy" class="footer-logo">
                    <img class="logo-icon-footer" src="../../Logo SAMBA.svg" alt="SAMBA" width="120" height="120">
                </a>
                <p class="footer-slogan">Rhythm in your assets,<br>Grip on your business</p>
                <a href="https://www.linkedin.com/company/sambaenergy" class="linkedin-icon" aria-label="LinkedIn" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="#FBFBFB"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
